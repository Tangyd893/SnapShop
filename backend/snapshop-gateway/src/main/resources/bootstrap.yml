spring:
  application:
    name: snapshop-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: snapshop-dev
      config:
        server-addr: localhost:8848
        namespace: snapshop-dev
        file-extension: yaml
        shared-configs:
          - data-id: snapshop-common.yaml
            group: DEFAULT_GROUP
            refresh: true

server:
  port: 8080

# Micrometer + Prometheus 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
