spring:
  application:
    name: snapshop-inventory
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: snapshop-dev
      config:
        server-addr: localhost:8848
        namespace: snapshop-dev
        file-extension: yaml
        shared-configs:
          - data-id: snapshop-common.yaml
            group: DEFAULT_GROUP
            refresh: true

server:
  port: 8086
