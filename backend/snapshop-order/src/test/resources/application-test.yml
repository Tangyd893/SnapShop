# 测试环境配置 - 禁用 Nacos 远程配置，使用本地配置
spring:
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
    sentinel:
      enabled: false
    loadbalancer:
      enabled: false
    openfeign:
      client:
        config:
          snapshop-inventory:
            url: http://localhost:8086
  datasource:
    url: jdbc:mysql://localhost:3306/snapshop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: snapshop
    password: snapshop123
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: snapshop
    password: snapshop123
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.discovery.reactive.NacosReactiveDiscoveryClientConfiguration

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.snapshop: DEBUG
    org.springframework.test: INFO
