version: "3.8"

services:
  mysql:
    image: mysql:8.0.36
    container_name: snapshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-snapshop}
      MYSQL_USER: ${MYSQL_USER:-snapshop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-snapshop123}
    ports:
      - "3306:3306"
    volumes:
      - snapshop-mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --tls-version=''
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.2
    container_name: snapshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: snapshop-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-snapshop}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-snapshop123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: snapshop-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./nacos/data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: snapshop-sentinel
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      JAVA_OPT: "-Dserver.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==================== 可观测性监控栈（profile: monitoring） ====================
  prometheus:
    image: prom/prometheus
    container_name: snapshop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana
    container_name: snapshop-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    profiles: ["monitoring"]

  # ==================== 链路追踪（profile: tracing） ====================
  jaeger:
    image: jaegertracing/all-in-one
    container_name: snapshop-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    profiles: ["tracing"]

volumes:
  snapshop-mysql-data:

